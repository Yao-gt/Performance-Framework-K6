name: K6 Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  deploy-k6-test-on-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the docker-compose up
        timeout-minutes: 2
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for Frontend (Healthcheck)
        run: |
          echo "Waiting for port 8080 to open..."
          timeout 60s bash -c 'until nc -z localhost 8080; do echo "8080 still closed... retrying"; sleep 5; done' || true
          
          if ! nc -z localhost 8080; then
            echo "ERROR: The port 8080 never opened. Showing frontend logs for debug:"
            docker logs shop-frontend
            exit 1
          fi

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run k6 test
        run: |
          docker run --rm --network host \
            --user $(id -u):$(id -g) \
            -v $(pwd):/apps \
            -w /apps \
            -e BASE_URL="http://127.0.0.1:8080" \
            -e TEST_NAME="test" \
            grafana/k6:latest \
            run src/scripts/api/test.js \
            --out influxdb=http://127.0.0.1:8086/k6
            
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-reports-history
          path: reports/*.html

      - name: Build the docker compose down
        if: always()
        run: docker compose -f docker/docker-compose.yml down
