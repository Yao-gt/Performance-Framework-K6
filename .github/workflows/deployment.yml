name: K6 Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  deploy-k6-test-on-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the docker-compose up
        timeout-minutes: 2
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for Frontend (Healthcheck)
        run: |
          echo "Esperando que el puerto 8080 abra..."
          # Reintenta cada 5 segundos durante 1 minuto
          timeout 60s bash -c 'until nc -z localhost 8080; do echo "8080 sigue cerrado... reintentando"; sleep 5; done' || true
          
          if ! nc -z localhost 8080; then
            echo "ERROR: El puerto 8080 nunca abrió. Mostrando logs del frontend para debug:"
            docker logs shop-frontend
            exit 1
          fi

      - name: Verify Ports
        run: sudo netstat -tulpn | grep LISTEN

      - name: Check running containers
        run: docker ps

      - name: Print shop-frontend logs
        run: docker logs shop-frontend
      - name: Print influxdb logs
        run: docker logs influxdb

      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: src/scripts/api/test.js
          flags: --out influxdb=http://127.0.0.1:8086/k6
        env:
          BASE_URL: "http://127.0.0.1:8080"

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: k6-report-html
          path: summary.html 

      - name: Build the docker compose down
        timeout-minutes: 2
        run: docker compose down
